<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- Deliberately no user-scalable=no / maximum-scale lock here - native
         pinch-to-zoom and drag-to-pan must keep working on phone/tablet
         browsers. This dashboard is a fixed canvas (same layout as desktop/
         TV) that a mobile user zooms/pans into, rather than a separately
         reflowed compact mobile layout - a dedicated phase-2 mobile layout
         is a possible future improvement, out of scope for now. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shobdon Central — Weather Connectivity Test</title>
    <!-- Site-wide favicon (Airfield Central's jet icon) - covers both the
         landing page and every tenant dashboard automatically, since this
         is the one index.html shell every hostname shares. Sized set
         (16/32/48/192) plus apple-touch-icon (180) for iOS home-screen
         bookmarking - no manifest.json, not asked for here. -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/favicon-180.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
